name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install --quiet -e .

      - name: Generate the static demo report
        run: |
          mkdir -p site
          python - <<'PY'
          import html
          import sys
          from dataclasses import asdict
          from datetime import datetime, timedelta, timezone
          sys.path.insert(0, "src")

          from outlook_copilot_sorter.backend import MockGraphClient
          from outlook_copilot_sorter.classifier import Classifier, DEFAULT_CATALOG, route
          from outlook_copilot_sorter.copilot_drafter import CopilotDrafter
          from outlook_copilot_sorter.graph_subscription_manager import (
              MockSubscriptionClient, Subscription, refresh_all,
          )
          from outlook_copilot_sorter.learn_from_moves import (
              LabelCorrection, analyze_corrections,
          )

          client = MockGraphClient()
          clf = Classifier()
          drafter = CopilotDrafter()

          cards = []
          for e in client.list_inbox():
              r = clf.classify(e)
              d = route(r, clf.catalog)
              draft = drafter.draft(e, d.label) if d.drafts_reply else None
              cards.append({
                  "email": e, "result": r, "decision": d, "draft": draft,
              })

          def status_class(d):
              if d.review_required:
                  return "review"
              return "sorted"

          def status_label(d):
              if d.review_required:
                  return "REVIEW"
              return "SORTED"

          card_html_parts = []
          for c in cards:
              e = c["email"]
              r = c["result"]
              d = c["decision"]
              sc = status_class(d)
              sl = status_label(d)

              draft_html = ""
              if c["draft"] and not c["draft"].error:
                  body_esc = html.escape(c["draft"].body).replace("\n", "<br>")
                  draft_html = (
                      "<div class='kicker'>Drafted reply (template backend)</div>"
                      "<div class='draft'>"
                      f"<div class='draft-subject'>Subject: {html.escape(c['draft'].subject)}</div>"
                      f"<div class='draft-body'>{body_esc}</div>"
                      "</div>"
                  )

              cands_str = " &middot; ".join(
                  f"<code>{html.escape(name)}</code> {score:.2f}"
                  for name, score in r.candidates[:4]
              )

              reason_html = ""
              if d.review_required:
                  reason_html = f"<div class='reason'>Reason: {html.escape(d.review_reason)}</div>"

              card_html_parts.append(
                  "<div class='card'>"
                  f"<div class='card-header'>"
                  f"<span class='badge {sc}'>{sl}</span>"
                  f"<span class='mid'>{html.escape(e.id)}</span>"
                  "</div>"
                  "<div class='email-head'>"
                  f"<div><strong>From:</strong> {html.escape(e.sender_name)} &lt;{html.escape(e.sender_email)}&gt;</div>"
                  f"<div><strong>Subject:</strong> {html.escape(e.subject)}</div>"
                  "</div>"
                  f"<details><summary>Body preview</summary><pre>{html.escape(e.preview(400))}</pre></details>"
                  "<div class='grid'>"
                  "<div>"
                  "<div class='kicker'>Classified as</div>"
                  f"<div class='label'><code>{html.escape(r.label)}</code></div>"
                  "</div>"
                  "<div>"
                  "<div class='kicker'>Confidence</div>"
                  f"<div class='conf'>{r.confidence:.2f}</div>"
                  "</div>"
                  "<div>"
                  "<div class='kicker'>Routed to</div>"
                  f"<div class='queue'><code>{html.escape(d.folder)}</code> &middot; queue={html.escape(d.queue)}</div>"
                  "</div>"
                  "</div>"
                  "<div class='kicker'>Top candidates</div>"
                  f"<div class='cands'>{cands_str}</div>"
                  f"{reason_html}"
                  f"{draft_html}"
                  "</div>"
              )

          all_cards = "\n".join(card_html_parts)

          summary_line = (
              f"12 messages | "
              f"{sum(1 for c in cards if not c['decision'].review_required)} auto-routed | "
              f"{sum(1 for c in cards if c['decision'].review_required)} flagged for review | "
              f"{sum(1 for c in cards if c['draft'] and not c['draft'].error)} draft replies"
          )

          # === Subscription manager demo ===
          NOW_SIM = datetime(2026, 7, 1, 12, 0, tzinfo=timezone.utc)
          initial_subs = [
              Subscription(id="sub-alice", resource="/users/alice@corp/messages",
                           notification_url="https://sorter.example.com/graph-webhook",
                           client_state="secret", expiration=NOW_SIM + timedelta(hours=50)),
              Subscription(id="sub-bob", resource="/users/bob@corp/messages",
                           notification_url="https://sorter.example.com/graph-webhook",
                           client_state="secret", expiration=NOW_SIM + timedelta(hours=2)),
              Subscription(id="sub-carol", resource="/users/carol@corp/messages",
                           notification_url="https://sorter.example.com/graph-webhook",
                           client_state="secret", expiration=NOW_SIM - timedelta(hours=3)),
          ]
          sub_client = MockSubscriptionClient(initial=initial_subs)
          sub_report = refresh_all(
              sub_client, notification_url="https://sorter.example.com/graph-webhook",
              client_state="secret",
              desired_resources=[s.resource for s in initial_subs] +
                                ["/users/dan@corp/messages"],
              now=NOW_SIM,
          )

          # === Feedback loop demo ===
          NOW_FB = datetime(2026, 7, 1, tzinfo=timezone.utc)
          fb_corrections = []
          for i in range(5):
              fb_corrections.append(LabelCorrection(
                  email_id=f"m-cs-{i}", predicted_label="newsletter",
                  predicted_confidence=0.62, corrected_to="sales_opportunity",
                  corrected_at=NOW_FB, sender_email="cs@acme.com",
                  subject=f"Renewal proposal for Q{i} - please review",
              ))
          for i in range(6):
              fb_corrections.append(LabelCorrection(
                  email_id=f"m-aws-{i}", predicted_label="notification",
                  predicted_confidence=0.71, corrected_to="billing",
                  corrected_at=NOW_FB, sender_email="aws-invoice-team@amazon.com",
                  subject=f"Invoice available - AWS account xxxx-{i}",
              ))
          fb_update = analyze_corrections(
              fb_corrections,
              current_thresholds={"sales_opportunity": 0.55, "billing": 0.55, "newsletter": 0.55},
          )

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Outlook Copilot sorter - live demo</title>
            <style>
              :root {{
                --primary: #0369a1; --accent: #38bdf8;
                --bg: #f0f9ff; --border: #bae6fd;
                --ink: #0c4a6e; --muted: #64748b;
                --review: #b45309; --sorted: #047857;
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
                background: var(--bg); color: var(--ink); line-height: 1.5;
              }}
              .hero {{
                background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
                color: white; padding: 50px 24px 60px;
              }}
              .hero-inner {{ max-width: 1000px; margin: 0 auto; }}
              .hero .kicker {{ font-size: 13px; letter-spacing: 2px; opacity: .8; text-transform: uppercase; }}
              .hero h1 {{ font-size: 38px; margin: 10px 0 14px; line-height: 1.1; }}
              .hero p {{ font-size: 17px; margin: 0; opacity: .92; max-width: 760px; }}
              .container {{ max-width: 1000px; margin: -30px auto 60px; padding: 0 24px; }}
              .summary-line {{ font-family: Consolas, monospace; background: #0c4a6e; color: #bae6fd; padding: 14px 18px; border-radius: 6px; font-size: 14px; margin: 16px 0; }}
              .card {{
                background: white; border: 1px solid var(--border); border-radius: 12px;
                padding: 20px 24px; margin: 16px 0;
                box-shadow: 0 1px 3px rgba(3, 105, 161, .08);
              }}
              .card-header {{ display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }}
              .badge {{
                color: white; padding: 4px 10px; border-radius: 12px;
                font-size: 11px; letter-spacing: 1px; font-weight: 700;
              }}
              .badge.review {{ background: var(--review); }}
              .badge.sorted {{ background: var(--sorted); }}
              .mid {{ font-weight: 600; font-family: Consolas, monospace; color: var(--muted); }}
              .email-head {{ background: #e0f2fe; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }}
              details summary {{ cursor: pointer; color: var(--accent); font-weight: 600; margin-bottom: 8px; font-size: 13px; }}
              pre {{
                background: #0c4a6e; color: #e0f2fe; padding: 14px 16px;
                border-radius: 8px; overflow-x: auto;
                font-family: Consolas, Menlo, monospace; font-size: 12px;
                white-space: pre-wrap; word-wrap: break-word;
              }}
              .grid {{ display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin: 12px 0; }}
              .kicker {{
                font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
                color: var(--muted); margin: 8px 0 4px; font-weight: 600;
              }}
              .label code, .queue code {{
                background: #e0f2fe; padding: 3px 8px; border-radius: 5px;
                color: var(--primary); font-weight: 600; font-size: 14px;
              }}
              .conf {{ font-family: Consolas, monospace; font-size: 18px; font-weight: 600; }}
              .queue {{ font-size: 13px; }}
              .cands code {{
                background: #f0f9ff; padding: 2px 7px; border-radius: 4px;
                color: var(--primary); font-size: 12px;
              }}
              .reason {{ margin-top: 10px; color: var(--review); font-size: 13px; font-style: italic; }}
              .draft {{
                background: #ecfdf5; border-left: 4px solid #047857;
                padding: 14px 18px; border-radius: 4px; margin-top: 6px;
                font-size: 13px;
              }}
              .draft-subject {{ font-weight: 700; color: #064e3b; margin-bottom: 8px; }}
              .draft-body {{ color: #064e3b; }}
              .footer {{
                margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);
                color: var(--muted); font-size: 13px; text-align: center;
              }}
              .footer code {{ background: #e0f2fe; padding: 2px 6px; border-radius: 4px; }}
              .footer a {{ color: var(--accent); }}
            </style>
          </head>
          <body>
            <div class="hero">
              <div class="hero-inner">
                <div class="kicker">Outlook &middot; Copilot &middot; Graph webhook + client rules</div>
                <h1>Outlook Copilot sorter - live demo</h1>
                <p>Twelve bundled inbox items classified against the 6-label catalog,
                routed to folders, drafted where appropriate. Two delivery modes:
                server-side Graph webhook (LLM-classifiable, Copilot drafts) and
                client-side Outlook rules XML fallback for tenants without app-reg
                access. Regenerated on every push.</p>
              </div>
            </div>

            <div class="container">
              <div class="summary-line">{html.escape(summary_line)}</div>
              {all_cards}

              <div class="card">
                <h2 style="margin: 0 0 12px; color: var(--primary); font-size: 22px;">Graph subscription lifecycle (hourly refresh)</h2>
                <div class="summary-line">{html.escape(sub_report.summary())}</div>
                <p>Graph subscriptions for <code>/messages</code> have a max lifetime of 4230 minutes (~70 hrs).
                An hourly cron running <code>refresh_all()</code> keeps them alive: renews near-expiry,
                creates missing, removes + replaces expired. Log the summary line, alert on errors.</p>
              </div>

              <div class="card">
                <h2 style="margin: 0 0 12px; color: var(--primary); font-size: 22px;">Learn from user manual moves</h2>
                <div class="summary-line">{html.escape(fb_update.summary())}</div>
                <p>When users manually move messages, those moves are labeled corrections. Aggregate them
                over 100+ events (the demo shows 11), extract patterns, and produce a weekly
                <code>CatalogUpdate</code> the delivery lead reviews:</p>
                <ul style="font-size: 13px; margin: 8px 0 8px 20px;">
                  <li><strong>Sender rules</strong> — sender_locals consistently corrected to the same label</li>
                  <li><strong>Keyword changes</strong> — words that drive wrong-to-right transitions</li>
                  <li><strong>Threshold tuning</strong> — when the model is confidently wrong, raise the review threshold</li>
                </ul>
                <p style="font-size: 13px;">The kit does NOT auto-apply suggestions. A classifier that mutates itself is impossible to debug.</p>
              </div>

              <div class="footer">
                Regenerated on every push.
                Install: <code>pip install -e .</code> then <code>outlook-sorter demo</code>.<br>
                Source: <a href="https://github.com/derekgallardo01/outlook-copilot-sorter">github.com/derekgallardo01/outlook-copilot-sorter</a>
              </div>
            </div>
          </body>
          </html>
          """
          with open("site/index.html", "w", encoding="utf-8") as fh:
              fh.write(page)
          print("wrote site/index.html")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
